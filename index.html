<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoicCAD | Police Dispatch System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <script defer src="config/config.js"></script> <!-- Include the config script with defer to ensure it loads after the HTML is parsed -->
    <style>
        /* Additional styles for animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-gray-900 to-gray-800 text-white font-sans">

    <!-- Navigation Bar -->
    <header class="px-5 py-4 shadow-lg bg-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <img src="" alt="Police Logo" class="h-10" id="logo">
            <nav>
                <button id="loginButton" class="text-white font-bold py-2 px-4 rounded transition duration-300 hover:bg-gray-700">Login</button>
                <button id="toggleInfoButton" class="text-white font-bold py-2 px-4 rounded transition duration-300 hover:bg-gray-700">Toggle Info</button>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="text-center p-8 border border-gray-700 rounded-lg bg-gray-900 shadow-lg mt-6 mx-auto max-w-4xl">
        <h1 class="text-4xl mb-4 font-bold uppercase tracking-wider" id="mainTitle">StoicCAD</h1>
        <i class="fas fa-shield-alt fa-5x mb-6 text-blue-500"></i>
        <p class="mb-4 text-lg font-light" id="descriptionText">Your ultimate police dispatch system.</p>
        <div class="flex justify-center space-x-4">
            <a href="login.php" class="text-white font-bold py-2 px-4 rounded transition duration-300 hover:bg-gray-700">Login to CAD</a>

            <!-- You can add your own URL to your website if you choose here-->
            <a href="index.html" class="text-white font-bold py-2 px-4 rounded transition duration-300 hover:bg-gray-700">Return to Homepage</a>
        </div>
    </div>

    <!-- Info Cards Section -->
    <div class="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 p-4">
        <div class="p-6 max-w-sm mx-auto bg-blue-800 rounded-xl shadow-md space-y-2 hidden fade-in" id="infoCard1">
            <div class="text-lg font-medium text-white">Real-time Updates</div>
            <p class="text-gray-200">Stay informed with live incident updates.</p>
        </div>
        <div class="p-6 max-w-sm mx-auto bg-blue-800 rounded-xl shadow-md space-y-2 hidden fade-in" id="infoCard2">
            <div class="text-lg font-medium text-white">Secure Access</div>
            <p class="text-gray-200">Protected login system for authorized personnel.</p>
        </div>
        <div class="p-6 max-w-sm mx-auto bg-blue-800 rounded-xl shadow-md space-y-2 hidden fade-in" id="infoCard3">
            <div class="text-lg font-medium text-white">Efficient Management</div>
            <p class="text-gray-200">Streamlined tools for dispatch and task management.</p>
        </div>
    </div>

    <!-- Script for toggling info cards -->
    <script>
        const toggleInfoButton = document.getElementById('toggleInfoButton');
        const infoCards = document.querySelectorAll('.fade-in');

        toggleInfoButton.addEventListener('click', () => {
            infoCards.forEach(card => {
                card.classList.toggle('hidden');
            });
        });
    </script>

</body>
</html>
